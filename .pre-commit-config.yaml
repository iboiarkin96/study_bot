repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
        exclude: ^docs/pdoc/
      - id: trailing-whitespace
        exclude: ^docs/pdoc/
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [app, tests, scripts]
        pass_filenames: false

  - repo: local
    hooks:
      - id: require-pr-body
        name: require PR body file
        entry: scripts/check_pr_body.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: docs-maintainers-fix
        name: docs maintainers autofix
        entry: .venv/bin/python scripts/ensure_docs_maintainers.py
        language: system
        files: ^docs/.*\.html$
        exclude: ^docs/(api|assets)/|^docs/index\.html$
      - id: docs-design-maintainers
        name: docs design/maintainers check
        entry: .venv/bin/python scripts/validate_docs_design.py
        language: system
        files: ^docs/.*\.html$
        exclude: ^docs/(api|assets)/|^docs/index\.html$
      - id: audit-front-docs-links
        name: audit front docs (broken links, sidebar, prose mentions)
        entry: .venv/bin/python scripts/audit_front_docs_links.py --quiet
        language: system
        files: ^docs/(internal/front/|assets/internal-sidebar\.js)
        pass_filenames: false
      - id: sync-pr-body-on-push
        name: sync PR body to GitHub
        entry: scripts/sync_pr_body.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
