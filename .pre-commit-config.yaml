repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
        exclude: ^docs/api/
      - id: trailing-whitespace
        exclude: ^docs/api/
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [app, tests, scripts]
        pass_filenames: false

  - repo: local
    hooks:
      - id: docs-maintainers-fix
        name: docs maintainers autofix
        entry: .venv/bin/python scripts/ensure_docs_maintainers.py
        language: system
        files: ^docs/.*\.html$
        exclude: ^docs/(api|assets)/
      - id: docs-design-maintainers
        name: docs design/maintainers check
        entry: .venv/bin/python scripts/validate_docs_design.py
        language: system
        files: ^docs/.*\.html$
        exclude: ^docs/(api|assets)/
