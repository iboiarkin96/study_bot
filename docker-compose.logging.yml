# Optional: Elasticsearch + Kibana + Filebeat for structured logs (local development).
# Elasticsearch and Kibana are free to self-host for development; see ADR 0023 for licensing notes.
# Usage: make logging-up  (API should use LOG_FORMAT=json and write to ./logs)
#
# Heavy: allocate ~2 GiB RAM for Elasticsearch + Kibana combined.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: study-app-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: study-app-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: study-app-filebeat
    user: root
    command: filebeat -e -strict.perms=false
    depends_on:
      - elasticsearch
    volumes:
      - ./logs:/var/log/study-app:ro
      - ./ops/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    restart: unless-stopped

volumes:
  elasticsearch_data:
