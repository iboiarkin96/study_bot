<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="601px" preserveAspectRatio="none" style="width:630px;height:601px;background:#FFFFFF;" version="1.1" viewBox="0 0 630 601" width="630px" zoomAndPan="magnify"><title>Docs frontend &#8212; Rocket launch lifecycle</title><defs/><g><g class="title" data-source-line="274"><text fill="#0F172A" font-family="'Helvetica'" font-size="15" font-weight="bold" lengthAdjust="spacing" textLength="339.4702" x="138.5105" y="29.9233">Docs frontend &#8212; Rocket launch lifecycle</text></g><g><rect fill="#F8FAFC" height="82.4141" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="193.1274" x="239.08" y="409.1109"/><line style="stroke:#2563EB;stroke-width:1.2;" x1="239.08" x2="432.2074" y1="443.9156" y2="443.9156"/><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="23.1978" x="324.0448" y="430.3214">Idle</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="144.1387" x="250.08" y="465.1261">FAB hidden or compact</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="161.1274" x="250.08" y="477.9308">(no canvas, no transform)</text></g><g><rect fill="#F8FAFC" height="82.4141" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="173.5337" x="248.87" y="513.5309"/><line style="stroke:#2563EB;stroke-width:1.2;" x1="248.87" x2="422.4037" y1="548.3356" y2="548.3356"/><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="40.7344" x="315.2697" y="534.7414">Armed</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="112.1484" x="259.87" y="569.5461">FAB pill expanded</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="141.5337" x="259.87" y="582.3508">rocket icon brightened</text></g><g><rect fill="#F8FAFC" height="95.2188" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="178.7114" x="225.28" y="57.4609"/><line style="stroke:#2563EB;stroke-width:1.2;" x1="225.28" x2="403.9914" y1="92.2656" y2="92.2656"/><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="23.4824" x="302.8945" y="78.6714">Boil</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="146.7114" x="236.28" y="113.4761">0 to PRE_MS (2 000 ms)</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="144.9229" x="236.28" y="126.2808">thick volumetric smoke</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="140.3574" x="236.28" y="139.0854">around the launch pad</text></g><g><rect fill="#F8FAFC" height="95.2188" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="229.2803" x="7" y="174.6709"/><line style="stroke:#2563EB;stroke-width:1.2;" x1="7" x2="236.2803" y1="209.4756" y2="209.4756"/><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="36.0186" x="103.6309" y="195.8814">Flight</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="163.4961" x="18" y="230.6861">0 to DURATION (2 600 ms)</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="197.2803" x="18" y="243.4908">rocket follows fixed Bezier path</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="137.7524" x="18" y="256.2954">smoke killed at lift-off</text></g><g><rect fill="#F8FAFC" height="95.2188" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="159.4614" x="73.91" y="291.8909"/><line style="stroke:#2563EB;stroke-width:1.2;" x1="73.91" x2="233.3714" y1="326.6956" y2="326.6956"/><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="50.2627" x="128.5094" y="313.1014">Cleanup</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="99.4136" x="84.91" y="347.9061">up to one frame</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="105.3325" x="84.91" y="360.7108">canvas removed,</text><text fill="#475569" font-family="'Helvetica'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="127.4614" x="84.91" y="373.5154">GPU resources freed</text></g><ellipse cx="335.64" cy="339.5009" fill="#1D4ED8" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><g class="entity" data-qualified-name="GMN2" data-source-line="297" id="ent0003"><path d="M431.79,74.7809 L431.79,101.9409 L404.35,105.9409 L431.79,109.9409 L431.79,135.3434 A4,4 0 0 0 435.79,139.3434 L619.4912,139.3434 A4,4 0 0 0 623.4912,135.3434 L623.4912,80.7809 L613.4912,70.7809 L435.79,70.7809 A4,4 0 0 0 431.79,74.7809" fill="#FFFBEB" style="stroke:#D97706;stroke-width:1;"/><path d="M613.4912,70.7809 L613.4912,78.7809 A2,2 0 0 0 615.4912,80.7809 L623.4912,80.7809 L613.4912,70.7809" fill="#FFFBEB" style="stroke:#D97706;stroke-width:1;"/><text fill="#0F172A" font-family="'Helvetica'" font-size="10" lengthAdjust="spacing" textLength="111.3525" x="443.79" y="91.0632">determinism contract:</text><text fill="#0F172A" font-family="'Helvetica'" font-size="10" lengthAdjust="spacing" textLength="158.7012" x="443.79" y="102.7038">- fixed RNG seed (0x51F15EED)</text><text fill="#0F172A" font-family="'Helvetica'" font-size