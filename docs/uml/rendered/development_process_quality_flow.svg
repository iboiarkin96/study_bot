etica'" font-size="11" lengthAdjust="spacing" textLength="112.9165" x="133.2238" y="294.6948">3) Local quality gate</text><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="199.2944" x="133.2238" y="307.4995">`make verify` + `make docs-check`</text><rect fill="#F8FAFC" height="57.6094" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="231.2944" x="117.2238" y="400.7188"/><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="112.0303" x="133.2238" y="426.9292">Fix locally and rerun</text><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="199.2944" x="133.2238" y="439.7339">`make verify` + `make docs-check`</text><rect fill="#F8FAFC" height="57.6094" rx="4" ry="4" style="stroke:#2563EB;stroke-width:1.2;" width="235.0005" x="115.3707" y="490.0293"/><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="147.2593" x="131.3707" y="516.2397">up-&gt; :3) Local quality gate</text><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="203.0005" x="131.3707" y="529.0444">`make verify` + `make docs-check`;</text><polygon fill="#DBEAFE" points="171.1298,346.0938,294.6122,346.0938,306.6122,358.4961,294.6122,370.8984,171.1298,370.8984,159.1298,358.4961,171.1298,346.0938" style="stroke:#1D4ED8;stroke-width:1.2;"/><text fill="#475569" font-family="'Helvetica'" font-size="10" lengthAdjust="spacing" textLength="12.4561" x="242.871" y="386.1807">no</text><text fill="#0F172A" font-family="'Helvetica'" font-size="11" lengthAdjust="spacing" textLength="111.4824" x="177.1298" y="362.3042">Local checks green?</text><text fill="#475569" font-family="'Helvetica'" font-size="10" lengthAdjust="spacing" textLength="17.2803" x="312.6122" y="350.1377">yes</text><polygon fill="#DBEAFE" points="232.871,567.6387,244.871,579.6387,232.871,591.6387,220.871,579.6387,232.871,567