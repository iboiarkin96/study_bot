acing" textLength="107.2461" x="61.5752" y="831.5674">6) Review and merge</text><rect fill="#F1F1F1" height="62.9219" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="235.3486" x="202.8213" y="808.2852"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="68.0518" x="216.8213" y="831.5674">Fix in branch;</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="207.3486" x="216.8213" y="843.208">Run `make verify` + `make docs-check`;</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="67.5391" x="216.8213" y="854.8486">Push updates</text><rect fill="#F1F1F1" height="51.2813" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="145.71" x="247.6406" y="891.207"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="117.71" x="261.6406" y="914.4893">up-&gt; :5) CI quality gate</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="107.1045" x="261.6406" y="926.1299">(full pipeline checks);</text><polygon fill="#F1F1F1" points="217.8469,952.4883,229.8469,964.4883,217.8469,976.4883,205.8469,964.4883,217.8469,952.4883" style="stroke:#181818;stroke-width:0.5;"/><ellipse cx="217.8469" cy="1007.4883" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="217.8469" cy="1007.4883" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#64748B;stroke-width:1.1;" x1="217.8469" x2="217.8469" y1="75.2969" y2="95.2969"/><polygon fill="#64748B" points="213.8469,85.2969,217.8469,95.2969,221.8469,85.2969,217.8469,89.2969" style="stroke:#64748B;stroke-width:1;"/><line style="stroke:#64748B;stroke-width:1.1;" x1="217.8469" x2="217.8469" y1="146.5781" y2="166.5781"/><polygon fill="#64748B" points="213.8469,156.5781,217.8469,166.5781,221.8469,156.5781,217.8469,160.5781" style="stroke:#64748B;stroke-w