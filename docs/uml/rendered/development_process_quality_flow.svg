<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1029px" preserveAspectRatio="none" style="width:485px;height:1029px;background:#FFFFFF;" version="1.1" viewBox="0 0 485 1029" width="485px" zoomAndPan="magnify"><title>Study App - Development Process with Quality Helpers</title><defs/><g><g class="title" data-source-line="44"><text fill="#000000" font-family="'Arial'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="434.7451" x="24" y="36.9951">Study App - Development Process with Quality Helpers</text></g><ellipse cx="217.8469" cy="65.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="51.2813" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="135.5439" x="150.075" y="95.2969"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="107.5439" x="164.075" y="118.5791">1) Implement change</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="69.8291" x="164.075" y="130.2197">(code + docs)</text><rect fill="#E8F5E9" height="62.9219" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="167.3262" x="134.1838" y="166.5781"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="99.5947" x="148.1838" y="189.8604">2) Helper command</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="79.9902" x="148.1838" y="201.501">`make docs-fix`</text><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust="spacing" textLength="139.3262" x="148.1838" y="213.1416">(regenerates docs artifacts)</text><rect fill="#F1F1F1" height="51.2813" rx="3" ry="3" style="stroke:#181818;stroke-width:0.5;" width="209.1768" x="113.2585" y="249.5"/><text fill="#000000" font-family="'Arial'" font-size="10" lengthAdjust=