[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".git", ".venv", "alembic/versions"]

[tool.ruff.lint]
# E/F: pycodestyle + Pyflakes (F includes F401 unused imports).
select = ["E", "F", "I", "UP", "B"]
extend-select = ["RUF100"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Env must be set before app imports (see module docstring).
"tests/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
ignore_missing_imports = true
exclude = ["^alembic/versions/", "^tools/"]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.vulture]
paths = ["app", "tests", "scripts"]
exclude = ["alembic/versions/"]
min_confidence = 80

[tool.pytest.ini_options]
addopts = "-q --disable-warnings --cov=app --cov-report=term-missing"
filterwarnings = [
  "ignore::DeprecationWarning:fastapi.routing",
  "ignore::DeprecationWarning:starlette._utils",
]
