# Quality gate: `make deps-audit` then `make verify` (lint, types, OpenAPI, contract tests,
# pytest + coverage floor, docs-fix, docs-a11y-check). CI applies the docs pipeline on the runner instead
# of `docs-check` (no git drift vs HEAD). Contributors should still run `make verify-ci`
# (includes deps-audit + docs-check)
# locally before push. GitHub-hosted runners are free for public repos
# and include a monthly allowance for private repos on free accounts.
name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR changelog gate
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 scripts/changelog_gate.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --event pr

      - name: Push changelog gate
        if: github.event_name == 'push'
        run: |
          python3 scripts/changelog_gate.py \
            --base "${{ github.event.before }}" \
            --head "${{ github.event.after }}" \
            --event push

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Dependency audit (pip-audit)
        run: make deps-audit

      - name: Quality gate
        run: make verify

      - name: Pre-commit hooks
        run: .venv/bin/pre-commit run --all-files

  # CD: push the same Dockerfile artifact to GHCR after quality (and changelog on main/master).
  # Secrets: none beyond the default GITHUB_TOKEN (job permission packages:write). Runtime env
  # (DATABASE_URL, APP_ENV, …) belongs on the deployment host or PaaS — not in this workflow.
  # Pull: docker pull ghcr.io/<owner>/<repo>:<tag>
  publish-image:
    name: Publish container image (GHCR)
    runs-on: ubuntu-latest
    needs: [quality, changelog]
    if: |
      always() &&
      needs.quality.result == 'success' &&
      needs.changelog.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR paths must be lowercase)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
