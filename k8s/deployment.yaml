apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-app-api
  namespace: study-app
  labels:
    app: study-app-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: study-app-api
  template:
    metadata:
      labels:
        app: study-app-api
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: api
          image: study-app-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: study-app-api-config
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: study-app-sqlite
