# Optional — only when you run the API in Kubernetes with APP_ENV=qa (or prod) and need a real API key.
#
# Default local manifests use APP_ENV=dev (see k8s/app.env): the app uses the built-in dev default for
# API_MOCK_API_KEY from app/core/config.py — no Secret required.
#
# For qa in-cluster:
#   1. Set APP_ENV=qa in k8s/app.env, run make k8s-render-configmap, commit the generated configmap.
#   2. Create a secret (do not commit real values):
#        kubectl -n study-app create secret generic study-app-api-secret \
#          --from-literal=API_MOCK_API_KEY='your-non-default-key'
#   3. Add under containers[0].envFrom in k8s/deployment.yaml:
#        - secretRef:
#            name: study-app-api-secret
apiVersion: v1
kind: Secret
metadata:
  name: study-app-api-secret
  namespace: study-app
type: Opaque
stringData:
  API_MOCK_API_KEY: replace-with-non-default-key
